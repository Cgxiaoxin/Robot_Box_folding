<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械臂3D可视化</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f6f1e8;
            --bg-panel: rgba(255, 253, 248, 0.92);
            --bg-soft: #ebe4d7;
            --bg-canvas: linear-gradient(180deg, #f9f5ee 0%, #efe6d8 100%);
            --border: rgba(122, 102, 75, 0.16);
            --text: #31281f;
            --muted: #7e6f5f;
            --primary: #c96f42;
            --primary-soft: #f5d7c7;
            --accent: #5f8a7a;
            --shadow: 0 24px 60px rgba(88, 70, 47, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Manrope", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(227, 199, 159, 0.55), transparent 34%),
                linear-gradient(180deg, #fbf8f2 0%, var(--bg-page) 100%);
            color: var(--text);
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; padding: 18px; gap: 18px; }
        #canvas-container {
            flex: 1;
            position: relative;
            background: var(--bg-canvas);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        #canvas-container canvas { width: 100% !important; height: 100% !important; }
        .sidebar {
            width: 332px;
            background: var(--bg-panel);
            padding: 22px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }
        .sidebar h2 { font-size: 20px; margin-bottom: 20px; color: var(--text); letter-spacing: -0.02em; }
        .panel {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(122, 102, 75, 0.12);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
        }
        .panel-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .joint-control { display: flex; align-items: center; margin-bottom: 10px; }
        .joint-label { width: 50px; font-size: 12px; color: var(--muted); }
        .joint-slider { flex: 1; -webkit-appearance: none; height: 7px; background: #dfd1bf; border-radius: 999px; outline: none; }
        .joint-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; cursor: pointer; box-shadow: 0 3px 10px rgba(201, 111, 66, 0.32); }
        .joint-value { width: 50px; text-align: right; font-size: 12px; font-family: "IBM Plex Mono", monospace; color: var(--text); }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px 12px; border: 1px solid transparent; border-radius: 14px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: #fffaf6; box-shadow: 0 10px 18px rgba(201, 111, 66, 0.25); }
        .btn-secondary { background: #fffaf3; color: var(--text); border-color: rgba(122, 102, 75, 0.16); }
        .status-indicator { display: flex; align-items: center; gap: 8px; padding: 12px; background: rgba(255, 255, 255, 0.72); border: 1px solid rgba(122, 102, 75, 0.12); border-radius: 16px; margin-bottom: 15px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d0615f; }
        .status-dot.connected { background: #4f9d78; }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; padding: 7px 0; border-bottom: 1px solid rgba(122, 102, 75, 0.1); }
        .info-label { color: var(--muted); }
        .info-value { color: var(--primary); font-family: "IBM Plex Mono", monospace; }
        .view-controls { display: flex; gap: 5px; }
        .view-btn { padding: 7px 11px; background: #fffaf3; border: 1px solid rgba(122, 102, 75, 0.14); border-radius: 12px; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 700; }
        .view-btn.active { background: var(--primary-soft); color: #8f4b2a; border-color: rgba(201, 111, 66, 0.22); }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(249, 243, 234, 0.82); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 100; backdrop-filter: blur(8px); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #deccb4; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div id="canvas-container">
            <div class="loading-overlay" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px;">加载3D场景...</p>
            </div>
        </div>
        <div class="sidebar">
            <h2>机械臂 3D 视图</h2>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">未连接</span>
            </div>
            <div class="panel">
                <div class="panel-title">视图控制</div>
                <div class="view-controls">
                    <button class="view-btn active" onclick="setView('front')">正面</button>
                    <button class="view-btn" onclick="setView('top')">顶部</button>
                    <button class="view-btn" onclick="setView('side')">侧面</button>
                    <button class="view-btn" onclick="setView('perspective')">透视</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">左臂关节控制</div>
                <div id="left-joints"></div>
            </div>
            <div class="panel">
                <div class="panel-title">右臂关节控制</div>
                <div id="right-joints"></div>
            </div>
            <div class="panel">
                <div class="panel-title">实时数据</div>
                <div id="realtime-data">
                    <div class="info-row"><span class="info-label">FPS</span><span class="info-value" id="fps-value">60</span></div>
                    <div class="info-row"><span class="info-label">左臂末端X</span><span class="info-value" id="left-end-x">0.00</span></div>
                    <div class="info-row"><span class="info-label">左臂末端Y</span><span class="info-value" id="left-end-y">0.00</span></div>
                    <div class="info-row"><span class="info-label">右臂末端X</span><span class="info-value" id="right-end-x">0.00</span></div>
                    <div class="info-row"><span class="info-label">右臂末端Y</span><span class="info-value" id="right-end-y">0.00</span></div>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="resetView()">重置视角</button>
                <button class="btn btn-primary" onclick="syncFromReal()">同步实机</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, leftArm, rightArm;
        const JOINT_COLORS = [0xFF6B6B, 0x4ECDC4, 0x45B7D1, 0x96CEB4, 0xFFEAA7, 0xDDA0DD, 0x98D8C8];
        const LINK_COLOR = 0x666666, BASE_COLOR = 0x333333;
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5ede2);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(2, 1.5, 2);
            camera.lookAt(0, 0.3, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.75));
            const dirLight = new THREE.DirectionalLight(0xfffbf4, 1.05);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);
            const fillLight = new THREE.DirectionalLight(0xf1caa8, 0.5);
            fillLight.position.set(-5, 3, -5);
            scene.add(fillLight);
            
            const grid = new THREE.GridHelper(2, 20, 0xcdb8a0, 0xe8dccd);
            scene.add(grid);
            
            leftArm = createArm(-0.3);
            rightArm = createArm(0.3);
            scene.add(leftArm);
            scene.add(rightArm);
            
            createJointControls('left');
            createJointControls('right');
            bindSliderEvents();
            
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
            window.addEventListener('resize', onWindowResize);
            animate();
        }
        
        function createArm(xOffset) {
            const arm = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.1, 32), new THREE.MeshStandardMaterial({ color: BASE_COLOR }));
            base.position.y = 0.05;
            arm.add(base);
            
            const joints = [], links = [];
            for (let i = 0; i < 7; i++) {
                const joint = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), new THREE.MeshStandardMaterial({ color: JOINT_COLORS[i], emissive: JOINT_COLORS[i], emissiveIntensity: 0.2 }));
                joint.position.set(xOffset, 0.1 + i * 0.1, 0);
                joints.push(joint);
                arm.add(joint);
                
                if (i < 6) {
                    const link = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.1, 16), new THREE.MeshStandardMaterial({ color: LINK_COLOR }));
                    link.position.set(xOffset, 0.15 + i * 0.1, 0);
                    links.push(link);
                    arm.add(link);
                }
            }
            arm.userData = { joints, links, xOffset };
            return arm;
        }
        
        function createJointControls(armId) {
            const container = document.getElementById(armId + '-joints');
            for (let i = 0; i < 7; i++) {
                const div = document.createElement('div');
                div.className = 'joint-control';
                div.innerHTML = `<span class="joint-label">J${i+1}</span><input type="range" class="joint-slider" min="-3.14" max="3.14" step="0.01" value="0" data-arm="${armId}" data-joint="${i}"><span class="joint-value" id="${armId}-j${i}-value">0.00</span>`;
                container.appendChild(div);
            }
        }
        
        function bindSliderEvents() {
            document.querySelectorAll('.joint-slider').forEach(slider => {
                slider.addEventListener('input', e => {
                    const arm = e.target.dataset.arm, joint = e.target.dataset.joint, value = parseFloat(e.target.value);
                    document.getElementById(`${arm}-j${joint}-value`).textContent = value.toFixed(2);
                    updateArmPose(arm === 'left' ? leftArm : rightArm, arm);
                });
            });
        }
        
        function updateArmPose(arm, armId) {
            const { joints, xOffset } = arm.userData;
            for (let i = 0; i < 7; i++) {
                const slider = document.querySelector(`input[data-arm="${armId}"][data-joint="${i}"]`);
                const angle = slider ? parseFloat(slider.value) : 0;
                joints[i].position.y = 0.1 + i * 0.1 + Math.sin(angle) * 0.02;
                joints[i].position.x = xOffset + Math.cos(angle) * 0.02;
            }
            document.getElementById(`${armId}-end-x`).textContent = joints[6].position.x.toFixed(2);
            document.getElementById(`${armId}-end-y`).textContent = joints[6].position.y.toFixed(2);
        }
        
        function setView(view) {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const views = { front: [0, 0.5, 2], top: [0, 2, 0.01], side: [2, 0.5, 0], perspective: [2, 1.5, 2] };
            camera.position.set(...views[view]);
            camera.lookAt(0, 0.3, 0);
        }
        
        function resetView() { camera.position.set(2, 1.5, 2); camera.lookAt(0, 0.3, 0); }
        function syncFromReal() { console.log('同步实机数据...'); }
        
        let lastTime = performance.now(), frameCount = 0;
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;
            if (performance.now() - lastTime >= 1000) {
                document.getElementById('fps-value').textContent = frameCount;
                frameCount = 0; lastTime = performance.now();
            }
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        init();
    </script>
</body>
</html>
